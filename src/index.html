
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./assets/img/4geeks.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Domain Name Generator</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="bg-light">
    <div class="container text-center mt-5">
      <h1 class="mb-4 text-primary">🌐 Domain Name Generator</h1>

      <input
        id="input-base"
        type="text"
        class="form-control w-50 mx-auto mb-3"
        placeholder="Write a name (example: hola.com)"
      />

      <button id="btn-generate" class="btn btn-primary mb-4">
        Generate Domains
      </button>

      <pre
        id="output"
        class="bg-white p-3 rounded border w-50 mx-auto text-start"
        style="min-height: 200px;"
      ></pre>
      <div class="fixed-bottom p-4">
        Made with ❤️ by
        <a href="Juan Masis G.">Juan Masis G.</a>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
